name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  syntax-check:
    name: Python Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Compile Check
        run: python -m py_compile *.py 2>&1 || echo "Warning: Some files may have import dependencies"

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Secret Detection
        uses: gitleaks/gitleaks-action@v2
        with:
          config-path: .gitleaks.toml
        continue-on-error: true

  code-quality:
    name: Code Quality Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: List Project Structure
        run: |
          echo "=== Project Files ==="
          ls -la *.py *.md 2>/dev/null || true
          echo "=== Python Files Count ==="
          find . -name "*.py" -not -path "./versions/*" | wc -l

  version-check:
    name: Version Consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Version Numbers
        run: |
          echo "Checking CHANGELOG.md exists..."
          test -f CHANGELOG.md && echo "PASS: CHANGELOG.md found" || echo "FAIL: CHANGELOG.md missing"
          echo "Checking README.md exists..."
          test -f README.md && echo "PASS: README.md found" || echo "FAIL: README.md missing"
