name: Backtest

on:
  push:
    branches: [ main ]
    paths:
      - '*.py'
  pull_request:
    branches: [ main ]
    paths:
      - '*.py'

jobs:
  backtest:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
    
    - name: Install dependencies
      run: |
        pip install numpy pandas
    
    - name: Run backtest
      run: |
        python standalone_backtest.py
      timeout-minutes: 10
